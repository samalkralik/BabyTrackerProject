{% extends 'baby_tracker_app/_base.html' %}
{% load crispy_forms_tags %}

{% block base_content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-warning">
                <div class="card-body">
                    <h3 class="text-warning mb-4">Edit Feeding Log</h3>

                    <form method="POST">
                        {% csrf_token %}
                        {{ form|crispy }}

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-outline-primary">Save Changes</button>

                            <button type="submit" name="delete" class="btn btn-outline-danger"
                                onclick="return confirm('Delete this record permanently?')">
                                Delete
                            </button>

                            <a href="/overview/{{ baby.id }}/feeding/"
                                class="btn btn-outline-secondary text-muted">Back</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
