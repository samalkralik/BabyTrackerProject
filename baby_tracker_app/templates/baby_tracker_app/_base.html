<!doctype html>
<html lang="en">
{% load static %}

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Baby Tracker app</title>
    <link href="{% static 'baby_tracker_app/bootstrap.min.css' %}" rel="stylesheet">
    <script defer src="{% static 'baby_tracker_app/bootstrap.bundle.min.js' %}"></script>

</head>

<body style="font-family: 'Google Sans Code'">
    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="{% static 'baby_tracker_app/baby_photo.jpg' %}" alt="" width="100" height="100"
                    style="width: 8rem; height: auto;">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    {% block nav_links %}
                    {% endblock %}
                </ul>

                <div class="d-flex align-items-right ms-auto">
                    {% if user.is_authenticated %}
                    <span class="me-3 text-muted small">Logged in as: <strong>{{ user.username }}</strong></span>

                    <div class="dropdown">
                        <button
                            class="btn btn-outline-secondary rounded-circle p-2 d-flex align-items-center justify-content-center"
                            type="button" id="userMenuButton" data-bs-toggle="dropdown" aria-expanded="false"
                            style="width: 40px; height: 40px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                                class="bi bi-list" viewBox="0 0 16 16">
                                <path fill-rule="evenodd"
                                    d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5" />
                            </svg>
                        </button>

                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2"
                            aria-labelledby="userMenuButton">
                            <li><a class="dropdown-item" href="/overview/">🍼 Baby Overview</a></li>
                            <li><a class="dropdown-item" href="#">⚙️ Settings</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <button type="submit" class="btn btn-danger btn-sm w-100 rounded-pill">
                                    Log Out
                                </button>
                            </li>
                        </ul>
                    </div>
                    {% else %}
                    <a href="#" class="btn btn-outline-primary rounded-pill px-4">Log In</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block base_content %}
        {% endblock %}
    </main>

    <footer class="py-4 mt-auto border-top">
        <div class="container text-center">
            <p class="mb-0 text-muted">&copy; 2026 BabyTrackerApp.</p>
        </div>
    </footer>


</body>

</html>
