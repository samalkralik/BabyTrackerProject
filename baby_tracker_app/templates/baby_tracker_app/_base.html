<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Baby Tracker app</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body style="font-family: 'Google Sans Code'">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">BabyTracker</a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    {% block nav_links %}
                    {% endblock %}
                </ul>

                <div class="d-flex align-items-center">
                    {% if user.is_authenticated %}
                    <span class="me-3 text-muted">Here will be username!</span>
                    <a href="#" class="btn btn-outline-danger rounded-pill px-4">Log Out</a>
                    {% else %}
                    <a href="#" class="btn btn-outline-primary rounded-pill px-4">Log In</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block base_content %}
        {% endblock %}
    </main>

    <footer class="py-4 mt-auto border-top">
        <div class="container text-center">
            <p class="mb-0 text-muted">&copy; 2026 BabyTrackerApp.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
